<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Luna & Todd Assets Generator</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffd7e8, transparent 35%),
        radial-gradient(circle at bottom right, #5c2f18, transparent 35%),
        #15100d;
      color: white;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4rem);
      color: #ff8fbd;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.55;
      color: #ffe9d8;
    }

    button,
    a.download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      margin-top: 18px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 4px solid #ffe4ef;
      background: linear-gradient(135deg, #ff74ad, #d94181, #dd7830);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 0 #6d301d;
    }

    button:hover,
    a.download-link:hover {
      transform: translateY(-2px);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 28px;
    }

    canvas {
      width: 100%;
      border-radius: 18px;
      background: white;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.25);
    }

    .note {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #ffd6ef;
    }

    @media (max-width: 620px) {
      .preview-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Party Assets Generator</h1>

    <p>
      Click the button below to generate a ready-to-upload
      <strong>assets.zip</strong> file for your GitHub Pages RSVP site.
    </p>

    <button type="button" id="generateButton">
      Generate Download Link
    </button>

    <div id="downloadArea"></div>

    <div class="preview-grid" id="previewGrid"></div>

    <p class="note">
      The zip includes: jumping-castle.png, party-food.png, party-games.png,
      movie-night.png, drinks.png, and beer-tap.png.
    </p>
  </main>

  <script>
    const ASSET_WIDTH = 800;
    const ASSET_HEIGHT = 600;

    const assetFiles = [
      {
        name: "assets/jumping-castle.png",
        draw: drawJumpingCastle
      },
      {
        name: "assets/party-food.png",
        draw: drawPartyFood
      },
      {
        name: "assets/party-games.png",
        draw: drawPartyGames
      },
      {
        name: "assets/movie-night.png",
        draw: drawMovieNight
      },
      {
        name: "assets/drinks.png",
        draw: drawDrinks
      },
      {
        name: "assets/beer-tap.png",
        draw: drawBeerTap
      }
    ];

    const generateButton = document.getElementById("generateButton");
    const downloadArea = document.getElementById("downloadArea");
    const previewGrid = document.getElementById("previewGrid");

    generateButton.addEventListener("click", async () => {
      downloadArea.innerHTML = "";
      previewGrid.innerHTML = "";

      const files = [];

      for (const asset of assetFiles) {
        const canvas = createCanvas();
        const context = canvas.getContext("2d");

        asset.draw(context, canvas.width, canvas.height);

        const blob = await canvasToBlob(canvas);
        const bytes = new Uint8Array(await blob.arrayBuffer());

        files.push({
          name: asset.name,
          data: bytes
        });

        previewGrid.appendChild(canvas);
      }

      const zipBytes = createZip(files);
      const zipBlob = new Blob([zipBytes], { type: "application/zip" });
      const url = URL.createObjectURL(zipBlob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "assets.zip";
      link.className = "download-link";
      link.textContent = "Download assets.zip";

      downloadArea.appendChild(link);
    });

    function createCanvas() {
      const canvas = document.createElement("canvas");
      canvas.width = ASSET_WIDTH;
      canvas.height = ASSET_HEIGHT;
      return canvas;
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), "image/png");
      });
    }

    function background(ctx, width, height, color1, color2) {
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, color1);
      gradient.addColorStop(1, color2);

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < 55; i++) {
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = "#ffffff";
        circle(
          ctx,
          Math.random() * width,
          Math.random() * height,
          3 + Math.random() * 9
        );
      }

      ctx.globalAlpha = 1;
    }

    function circle(ctx, x, y, radius) {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundedRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }

    function drawLabel(ctx, text, y, fill = "#ffffff") {
      ctx.save();
      ctx.font = "bold 54px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 10;
      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.strokeText(text, ASSET_WIDTH / 2, y);
      ctx.fillStyle = fill;
      ctx.fillText(text, ASSET_WIDTH / 2, y);
      ctx.restore();
    }

    function drawJumpingCastle(ctx, width, height) {
      background(ctx, width, height, "#ffaad0", "#8ddaf4");

      ctx.fillStyle = "#f45f9f";
      roundedRect(ctx, 145, 230, 510, 260, 42);

      ctx.fillStyle = "#89d7f3";
      roundedRect(ctx, 215, 160, 150, 320, 34);
      roundedRect(ctx, 435, 160, 150, 320, 34);

      ctx.fillStyle = "#ff77ae";
      roundedRect(ctx, 315, 105, 170, 375, 38);

      ctx.fillStyle = "#fff0f7";
      roundedRect(ctx, 340, 300, 120, 180, 60);

      ctx.fillStyle = "#b98bea";
      for (let i = 0; i < 5; i++) {
        circle(ctx, 210 + i * 95, 490, 58);
      }

      drawAxolotl(ctx, 245, 250, 1);
      drawAxolotl(ctx, 520, 260, 0.82);

      drawLabel(ctx, "Jumping Castle", 72);
    }

    function drawAxolotl(ctx, x, y, scale) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      ctx.fillStyle = "#ffc5dc";
      circle(ctx, 0, 0, 80);

      ctx.fillStyle = "#f45f9f";
      for (let i = -1; i <= 1; i++) {
        roundedRect(ctx, -120, -35 + i * 32, 60, 20, 10);
        roundedRect(ctx, 60, -35 + i * 32, 60, 20, 10);
      }

      ctx.fillStyle = "#1b1518";
      circle(ctx, -26, -12, 9);
      circle(ctx, 26, -12, 9);

      ctx.strokeStyle = "#d94181";
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.arc(0, 12, 28, 0.1, Math.PI - 0.1);
      ctx.stroke();

      ctx.restore();
    }

    function drawPartyFood(ctx, width, height) {
      background(ctx, width, height, "#ffe4ef", "#ff9fc4");

      ctx.fillStyle = "#fff8f2";
      roundedRect(ctx, 125, 320, 550, 90, 45);

      ctx.fillStyle = "#d94181";
      circle(ctx, 240, 300, 72);
      ctx.fillStyle = "#6fc35c";
      ctx.beginPath();
      ctx.moveTo(220, 230);
      ctx.lineTo(260, 230);
      ctx.lineTo(240, 190);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#ffcf45";
      circle(ctx, 370, 300, 68);

      ctx.fillStyle = "#7bc043";
      circle(ctx, 500, 300, 66);

      ctx.fillStyle = "#f6d45d";
      for (let i = 0; i < 7; i++) {
        roundedRect(ctx, 210 + i * 58, 390 - Math.random() * 25, 42, 95, 12);
      }

      ctx.fillStyle = "#ffffff";
      for (let i = 0; i < 22; i++) {
        circle(ctx, 170 + Math.random() * 460, 335 + Math.random() * 42, 7);
      }

      drawLabel(ctx, "Party Food", 86, "#d94181");
    }

    function drawPartyGames(ctx, width, height) {
      background(ctx, width, height, "#a7ddf4", "#d7b5f4");

      ctx.fillStyle = "#ffffff";
      roundedRect(ctx, 180, 180, 190, 190, 28);
      roundedRect(ctx, 430, 180, 190, 190, 28);

      ctx.fillStyle = "#d94181";
      circle(ctx, 245, 245, 18);
      circle(ctx, 305, 245, 18);
      circle(ctx, 245, 305, 18);
      circle(ctx, 305, 305, 18);

      ctx.fillStyle = "#6241aa";
      circle(ctx, 475, 225, 18);
      circle(ctx, 575, 325, 18);

      ctx.fillStyle = "#ff77ae";
      roundedRect(ctx, 225, 410, 350, 75, 22);

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 38px Arial";
      ctx.textAlign = "center";
      ctx.fillText("PRIZES", 400, 460);

      drawLabel(ctx, "Party Games", 86, "#ffffff");
    }

    function drawMovieNight(ctx, width, height) {
      background(ctx, width, height, "#17102b", "#33205f");

      ctx.fillStyle = "#f6d45d";
      for (let i = 0; i < 35; i++) {
        circle(ctx, Math.random() * width, Math.random() * height * 0.55, 2 + Math.random() * 5);
      }

      ctx.fillStyle = "#222";
      roundedRect(ctx, 140, 190, 520, 285, 28);

      ctx.fillStyle = "#fff6d1";
      roundedRect(ctx, 170, 220, 460, 215, 16);

      ctx.fillStyle = "#ff77ae";
      roundedRect(ctx, 255, 350, 90, 120, 18);
      roundedRect(ctx, 360, 330, 90, 140, 18);
      roundedRect(ctx, 465, 350, 90, 120, 18);

      ctx.fillStyle = "#ffffff";
      circle(ctx, 300, 330, 35);
      circle(ctx, 405, 310, 35);
      circle(ctx, 510, 330, 35);

      drawLabel(ctx, "Movie Night", 86, "#ffffff");
    }

    function drawDrinks(ctx, width, height) {
      background(ctx, width, height, "#ffcfec", "#9ddcf2");

      ctx.fillStyle = "#ffffff";
      roundedRect(ctx, 190, 190, 150, 300, 28);
      roundedRect(ctx, 460, 190, 150, 300, 28);

      ctx.fillStyle = "#f8d24c";
      roundedRect(ctx, 210, 250, 110, 220, 20);

      ctx.fillStyle = "#8ed8f3";
      roundedRect(ctx, 480, 250, 110, 220, 20);

      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.moveTo(270, 190);
      ctx.lineTo(240, 105);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(540, 190);
      ctx.lineTo(580, 105);
      ctx.stroke();

      ctx.fillStyle = "#d94181";
      circle(ctx, 280, 230, 20);
      circle(ctx, 520, 230, 20);

      drawLabel(ctx, "Kids' Drinks", 86, "#d94181");
    }

    function drawBeerTap(ctx, width, height) {
      background(ctx, width, height, "#120d0b", "#5c2f18");

      ctx.fillStyle = "#3b2115";
      roundedRect(ctx, 170, 265, 460, 85, 28);

      ctx.fillStyle = "#d18a3c";
      roundedRect(ctx, 265, 150, 90, 310, 28);
      roundedRect(ctx, 445, 150, 90, 310, 28);

      ctx.fillStyle = "#f4d095";
      roundedRect(ctx, 280, 250, 60, 175, 18);
      roundedRect(ctx, 460, 250, 60, 175, 18);

      ctx.fillStyle = "#ffffff";
      roundedRect(ctx, 275, 230, 70, 42, 20);
      roundedRect(ctx, 455, 230, 70, 42, 20);

      ctx.fillStyle = "#22130d";
      roundedRect(ctx, 245, 115, 130, 58, 24);
      roundedRect(ctx, 425, 115, 130, 58, 24);

      ctx.fillStyle = "#e2b36e";
      ctx.font = "bold 24px Arial";
      ctx.textAlign = "center";
      ctx.fillText("CRAFT", 310, 152);
      ctx.fillText("GINGER", 490, 152);

      drawLabel(ctx, "Beer On Tap", 82, "#f4d095");
    }

    function createZip(files) {
      const localParts = [];
      const centralParts = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = encodeText(file.name);
        const data = file.data;
        const crc = crc32(data);
        const time = getDosTime(new Date());
        const date = getDosDate(new Date());

        const localHeader = new Uint8Array(30 + nameBytes.length);
        const localView = new DataView(localHeader.buffer);

        localView.setUint32(0, 0x04034b50, true);
        localView.setUint16(4, 20, true);
        localView.setUint16(6, 0, true);
        localView.setUint16(8, 0, true);
        localView.setUint16(10, time, true);
        localView.setUint16(12, date, true);
        localView.setUint32(14, crc, true);
        localView.setUint32(18, data.length, true);
        localView.setUint32(22, data.length, true);
        localView.setUint16(26, nameBytes.length, true);
        localView.setUint16(28, 0, true);
        localHeader.set(nameBytes, 30);

        localParts.push(localHeader, data);

        const centralHeader = new Uint8Array(46 + nameBytes.length);
        const centralView = new DataView(centralHeader.buffer);

        centralView.setUint32(0, 0x02014b50, true);
        centralView.setUint16(4, 20, true);
        centralView.setUint16(6, 20, true);
        centralView.setUint16(8, 0, true);
        centralView.setUint16(10, 0, true);
        centralView.setUint16(12, time, true);
        centralView.setUint16(14, date, true);
        centralView.setUint32(16, crc, true);
        centralView.setUint32(20, data.length, true);
        centralView.setUint32(24, data.length, true);
        centralView.setUint16(28, nameBytes.length, true);
        centralView.setUint16(30, 0, true);
        centralView.setUint16(32, 0, true);
        centralView.setUint16(34, 0, true);
        centralView.setUint16(36, 0, true);
        centralView.setUint32(38, 0, true);
        centralView.setUint32(42, offset, true);
        centralHeader.set(nameBytes, 46);

        centralParts.push(centralHeader);

        offset += localHeader.length + data.length;
      }

      const centralOffset = offset;
      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);

      const endHeader = new Uint8Array(22);
      const endView = new DataView(endHeader.buffer);

      endView.setUint32(0, 0x06054b50, true);
      endView.setUint16(4, 0, true);
      endView.setUint16(6, 0, true);
      endView.setUint16(8, files.length, true);
      endView.setUint16(10, files.length, true);
      endView.setUint32(12, centralSize, true);
      endView.setUint32(16, centralOffset, true);
      endView.setUint16(20, 0, true);

      return concatUint8Arrays([...localParts, ...centralParts, endHeader]);
    }

    function concatUint8Arrays(arrays) {
      const totalLength = arrays.reduce((sum, array) => sum + array.length, 0);
      const result = new Uint8Array(totalLength);
      let offset = 0;

      for (const array of arrays) {
        result.set(array, offset);
        offset += array.length;
      }

      return result;
    }

    function encodeText(value) {
      return new TextEncoder().encode(value);
    }

    function getDosTime(date) {
      return (
        (date.getHours() << 11) |
        (date.getMinutes() << 5) |
        Math.floor(date.getSeconds() / 2)
      );
    }

    function getDosDate(date) {
      return (
        ((date.getFullYear() - 1980) << 9) |
        ((date.getMonth() + 1) << 5) |
        date.getDate()
      );
    }

    function crc32(data) {
      let crc = -1;

      for (let i = 0; i < data.length; i++) {
        crc = (crc >>> 8) ^ crcTable[(crc ^ data[i]) & 0xff];
      }

      return (crc ^ -1) >>> 0;
    }

    const crcTable = (() => {
      const table = new Uint32Array(256);

      for (let i = 0; i < 256; i++) {
        let c = i;

        for (let k = 0; k < 8; k++) {
          c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
        }

        table[i] = c >>> 0;
      }

      return table;
    })();
  </script>
</body>
</html>
